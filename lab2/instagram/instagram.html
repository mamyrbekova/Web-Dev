<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
  <title>Instagram</title>
  <link rel = "stylesheet" href = "instagram_style.css">
</head>

<body>

  <div id = "main">
    <img src = "phones.png" width = "350" height = "560" >
    <section class = "user">
     <div class = "login">
         <div class = "instagram-logo">
            <img src = "instagram-logo.png" width = "150" height = "75">
         </div>

         <form id = "login-post">
          <div class = "inputs-container">
            <input type = "text" name = "Phone number," placeholder = "Phone number, username or email address ">
          </div>
          <div class = "inputs-container">
            <input type = "Password" name = "Password" placeholder = "Password">
          </div>
          <a class = "login-button" href = "#" target = "_blank">Log In</a>

          <div class = "or-container">
            <div class = "line"></div>
            <div class = "or">OR</div>
            <div class = "line"></div>
          </div>

          
          <div class = "facebook-container">
            <a class = "facebook-login" href = "#" target = "_blank"><img class = "facebook-logo"
                src = "facebook-logo.png" width = "140" height = "15">Log in with Facebook </a>
          </div>
         </form>

    
        <a class = "password-forgot" href = "#" target = "_blank">Forgotten your password?</a>
     </div>

     
      <div class = "signup-container">
        <p>Don't have an account?<a class = "signup" href = "#" target = "_blank">Sign up</a></p>
      </div>

 
      <div class = "get-container">
        <p>Get the app</p>
        <div class = "download-container">
          <a class = "download-appstore" href = "#" target = "_blank"><img class = "appstore"
              src = "applestore-logo.png"></a>
          <a class = "download-googleplay" href = "#" target = "_blank"><img class = "googleplay"
              src = "googleplay-logo.png"></a>
        </div>
      </div>

    </section>

  </div>

  <div class = "underpage">
    <div class = "box1">
        <span> Meta </span>
        <span> About </span>
        <span> Blog</span>
        <span> Jobs</span>
        <span> Help</span>
        <span> API</span>
        <span> Privacy</span>
        <span> Terms</span>
        <span> Top Accounts</span>
        <span> Locations</span>
        <span> Instagram Lite</span>
        <span> Contact Uploading & Non-Users</span>
    </div>
    <div class = "box2">
            <select>
                <option>English</option>
                <option>Afrikaans</option>
                <option>Čeština</option>
                <option>Dansk</option>
                <option>Deutsch</option>
                <option>Ελληνικά</option>
                <option>English (UK)</option>
                <option>Español (España)</option>
                <option>Español</option>
            </select>
        <span> © 2023 Instagram from Meta </span>
    </div>
</div>
</body>

</html>
